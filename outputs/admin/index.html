<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | Atelier Autoral</title>
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <main>
      <section class="login-screen" id="loginScreen">
        <form class="login-card" id="loginForm">
          <p class="eyebrow">Atelier Autoral</p>
          <h1>Administração</h1>
          <label>
            Usuário
            <input id="loginUser" autocomplete="username" required />
          </label>
          <label>
            Senha
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <p class="error" id="loginError"></p>
          <button class="primary" type="submit">Entrar</button>
        </form>
      </section>

      <section class="app" id="adminApp" hidden>
        <aside class="sidebar">
          <div>
            <p class="eyebrow">Atelier Autoral</p>
            <h1>Painel Admin</h1>
          </div>
          <nav>
            <button class="tab active" type="button" data-view="products">Obras e estoque</button>
            <button class="tab" type="button" data-view="users">Usuários</button>
            <button class="tab" type="button" data-view="settings">Pagamentos</button>
          </nav>
          <div class="session">
            <span id="sessionUser"></span>
            <button id="logoutButton" type="button">Sair</button>
          </div>
        </aside>

        <section class="workspace">
          <header class="top">
            <div>
              <p class="eyebrow" id="viewEyebrow">Gestão</p>
              <h2 id="viewTitle">Obras e estoque</h2>
            </div>
            <a href="../index.html" target="_blank" rel="noreferrer">Ver loja</a>
          </header>

          <section class="view active" id="productsView">
            <div class="grid">
              <form class="panel form" id="productForm">
                <input type="hidden" id="productId" />
                <label>
                  Nome da obra
                  <input id="titleInput" required />
                </label>
                <div class="split">
                  <label>
                    Coleção
                    <input id="collectionInput" required />
                  </label>
                  <label>
                    Cor predominante
                    <input id="colorInput" required />
                  </label>
                </div>
                <div class="split">
                  <label>
                    Material
                    <input id="materialInput" required />
                  </label>
                  <label>
                    Tipo de pintura
                    <input id="paintInput" required />
                  </label>
                </div>
                <div class="quad">
                  <label>
                    Altura
                    <input id="heightInput" type="number" min="1" required />
                  </label>
                  <label>
                    Largura
                    <input id="widthInput" type="number" min="1" required />
                  </label>
                  <label>
                    Espessura
                    <input id="depthInput" type="number" min="0" step="0.1" required />
                  </label>
                  <label>
                    Estoque
                    <input id="stockInput" type="number" min="0" required />
                  </label>
                </div>
                <label>
                  Preço
                  <input id="priceInput" type="number" min="0" step="0.01" required />
                </label>
                <label>
                  Descrição
                  <textarea id="descriptionInput" rows="6" required></textarea>
                </label>
                <label>
                  Fotos da obra
                  <input id="imageInput" type="file" accept="image/*" multiple />
                </label>
                <div class="photo-sequence" id="photoSequence"></div>
                <label>
                  Quadros similares
                  <select id="similarInput" multiple size="5"></select>
                </label>
                <div class="actions">
                  <button class="primary" type="submit">Salvar obra</button>
                  <button id="newProduct" type="button">Novo</button>
                </div>
              </form>

              <div class="panel">
                <div class="panel-head">
                  <h3>Estoque</h3>
                  <span id="productCount"></span>
                </div>
                <div id="productList"></div>
              </div>
            </div>
          </section>

          <section class="view" id="usersView">
            <div class="grid">
              <form class="panel form" id="userForm">
                <input type="hidden" id="editingUser" />
                <label>
                  Nome
                  <input id="userNameInput" required />
                </label>
                <label>
                  Usuário
                  <input id="userLoginInput" required />
                </label>
                <label>
                  Senha
                  <input id="userPasswordInput" type="password" required />
                </label>
                <label>
                  Perfil
                  <select id="userRoleInput">
                    <option value="admin">Administrador</option>
                    <option value="editor">Editor</option>
                  </select>
                </label>
                <div class="actions">
                  <button class="primary" type="submit">Salvar usuário</button>
                  <button id="newUser" type="button">Novo</button>
                </div>
              </form>
              <div class="panel">
                <div class="panel-head">
                  <h3>Usuários</h3>
                  <span id="userCount"></span>
                </div>
                <div id="userList"></div>
              </div>
            </div>
          </section>

          <section class="view" id="settingsView">
            <div class="panel settings">
              <h3>Mercado Pago</h3>
              <p>Informe o endpoint seguro do seu backend. Ele deve criar a preferência de pagamento no Mercado Pago e retornar `init_point`.</p>
              <label>
                Endpoint de checkout
                <input id="checkoutEndpointInput" placeholder="https://seu-backend.com/api/checkout" />
              </label>
              <button class="primary" id="saveCheckoutEndpoint" type="button">Salvar configuração</button>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="./app.js?v=3"></script>
  </body>
</html>
